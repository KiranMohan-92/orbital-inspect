apiVersion: v1
kind: Service
metadata:
  name: {{ include "orbital-inspect.fullname" . }}-api
  labels:
    {{- include "orbital-inspect.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "orbital-inspect.apiSelectorLabels" . | nindent 4 }}
