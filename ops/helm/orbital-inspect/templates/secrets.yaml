{{/*
  secrets.yaml — template showing which external secrets must exist.
  This chart does NOT manage secret values directly; it only documents
  the expected secret keys and optionally creates placeholder Secrets
  so `helm install --dry-run` succeeds without real credentials.

  In production, provision these secrets via:
    - External Secrets Operator
    - Sealed Secrets
    - Vault Agent Injector
    - kubectl create secret generic …
*/}}
{{- if .Release.IsInstall }}
# Reminder: create the following secrets before deploying:
#
#   kubectl create secret generic {{ .Values.auth.existingSecret }} \
#     --from-literal=JWT_SECRET=<strong-random-value>
#
#   kubectl create secret generic {{ .Values.postgresql.existingSecret }} \
#     --from-literal=DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/orbital_inspect
#
#   kubectl create secret generic {{ .Values.redis.existingSecret }} \
#     --from-literal=REDIS_URL=redis://:pass@host:6379
#
#   kubectl create secret generic {{ .Values.storage.existingSecret }} \
#     --from-literal=STORAGE_ACCESS_KEY_ID=<key-id> \
#     --from-literal=STORAGE_SECRET_ACCESS_KEY=<secret-key>
#
#   kubectl create secret generic {{ .Values.gemini.existingSecret }} \
#     --from-literal=GEMINI_API_KEY=<api-key>
{{- end }}
