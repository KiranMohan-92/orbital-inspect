global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: orbital-inspect-api
    metrics_path: /api/metrics/prometheus
    authorization:
      type: Bearer
      credentials: orbital-observability-dev-token
    static_configs:
      - targets: ["api:8000"]

  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: otel-collector-prometheus
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
