apiVersion: 1

datasources:
  - name: Orbital Prometheus
    uid: orbital-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Orbital Tempo
    uid: orbital-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToMetrics:
        datasourceUid: orbital-prometheus
      serviceMap:
        datasourceUid: orbital-prometheus
