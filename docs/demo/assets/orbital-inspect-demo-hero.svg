  <text x="602" y="592" fill="#7FD4FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">[2] SATELLITE VISION</text>
  <text x="602" y="624" fill="#7FD4FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">[3] ORBITAL ENVIRONMENT</text>
  <text x="602" y="656" fill="#7FD4FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">[4] FAILURE MODE ANALYSIS</text>
  <text x="602" y="688" fill="#7FD4FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">[5] INSURANCE RISK SYNTHESIS</text>
  <text x="572" y="701" fill="#91A8D8" font-family="Arial, Helvetica, sans-serif" font-size="19">The product feels rigorous because the work is visible while it happens.</text>

