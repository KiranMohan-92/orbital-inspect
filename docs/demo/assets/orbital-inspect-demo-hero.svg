  <text x="1322" y="647" fill="#E8F2FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">PORTFOLIO</text>
  <text x="1102" y="701" fill="#91A8D8" font-family="Arial, Helvetica, sans-serif" font-size="19">End on the operating system, not on the upload form.</text>

  <rect x="118" y="752" width="1364" height="52" rx="18" fill="#09152D" stroke="#223B69"/>
  <text x="154" y="785" fill="#A6B8E3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">What the viewer should remember: fast signal, explicit evidence, fail-closed trust, human review, fleet-scale leverage.</text>
