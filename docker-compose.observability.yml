services:
  api:
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_REQUIRED=${OTEL_REQUIRED:-false}
      - OTEL_SERVICE_NAME=${API_OTEL_SERVICE_NAME:-orbital-inspect-api}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=orbital-inspect,deployment.environment=compose}
      - OBSERVABILITY_SHARED_TOKEN=${OBSERVABILITY_SHARED_TOKEN:-orbital-observability-dev-token}

  worker:
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_REQUIRED=${OTEL_REQUIRED:-false}
      - OTEL_SERVICE_NAME=${WORKER_OTEL_SERVICE_NAME:-orbital-inspect-worker}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=orbital-inspect,deployment.environment=compose}
      - OBSERVABILITY_SHARED_TOKEN=${OBSERVABILITY_SHARED_TOKEN:-orbital-observability-dev-token}

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports: ["4317:4317", "4318:4318", "8888:8888", "8889:8889", "13133:13133"]
    volumes:
      - ./ops/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      tempo:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports: ["9090:9090"]
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      alertmanager:
        condition: service_started
      api:
        condition: service_started
      otel-collector:
        condition: service_started

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo.yaml"]
    ports: ["3200:3200"]
    volumes:
      - ./ops/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports: ["9093:9093"]
    volumes:
      - ./ops/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

  grafana:
    image: grafana/grafana:11.5.2
    ports: ["3001:3000"]
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-orbital}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-orbital_observability_password}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./ops/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

volumes:
  prometheus-data:
  tempo-data:
  grafana-data:
  alertmanager-data:
