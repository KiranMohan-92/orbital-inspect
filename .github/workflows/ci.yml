name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verification-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/check_verification_gates.py --base origin/${{ github.base_ref || 'main' }}

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orbital_inspect_test
          POSTGRES_USER: orbital
          POSTGRES_PASSWORD: orbital_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbital -d orbital_inspect_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      GEMINI_API_KEY: test-dummy-key
      DEMO_MODE: "false"
      AUTH_ENABLED: "false"
      DATABASE_AUTO_INIT: "true"
      DATABASE_URL: postgresql+asyncpg://orbital:orbital_dev_password@127.0.0.1:5432/orbital_inspect_test
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: ${{ github.workspace }}/backend/.ci-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: alembic -c alembic.ini upgrade head
      - run: python -m py_compile main.py
      - run: python -m py_compile agents/orchestrator.py
      - run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Python dependency audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
      - name: Generate SBOMs
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py requirements backend/requirements.txt -o backend-sbom.json
          npx --yes @cyclonedx/cyclonedx-npm --output-file frontend-sbom.json --package-lock-only --ignore-npm-errors --prefix frontend
      - uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            backend-sbom.json
            frontend-sbom.json

  observability:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GEMINI_API_KEY: test-dummy-key
      APP_ENV: test
      DEMO_MODE: "true"
      AUTH_ENABLED: "true"
      JWT_SECRET: observability-ci-secret
      OBSERVABILITY_SHARED_TOKEN: orbital-observability-ci-token
      OTEL_ENABLED: "true"
      OTEL_REQUIRED: "true"
      OTEL_SERVICE_NAME: orbital-inspect-api-ci
      OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4318/v1/traces
      DATABASE_AUTO_INIT: "true"
      DATABASE_URL: sqlite+aiosqlite:///file:orbital_observability_ci?mode=memory&cache=shared&uri=true
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: ${{ github.workspace }}/backend/.ci-observability-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: pytest tests/test_observability.py -v
      - name: Start OTel collector
        run: |
          docker run -d --name otel-collector \
            -p 4317:4317 \
            -p 4318:4318 \
            -p 8888:8888 \
            -p 8889:8889 \
            -p 13133:13133 \
            -v "${{ github.workspace }}/ops/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.121.0 \
            --config=/etc/otelcol-contrib/config.yaml
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:13133/ >/dev/null && break
            sleep 2
          done
      - name: Start backend with observability enabled
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/orbital-observability-backend.log 2>&1 &
          echo $! > /tmp/orbital_backend.pid
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/api/health >/dev/null && break
            sleep 2
          done
      - name: Verify collector-backed observability path
        run: |
          curl -fsS http://127.0.0.1:8000/api/health | python -c "import json,sys; data=json.load(sys.stdin); assert data['observability']['instrumented'] is True, data"
          curl -fsS -H "Authorization: Bearer ${OBSERVABILITY_SHARED_TOKEN}" http://127.0.0.1:8000/api/ready | python -c "import json,sys; data=json.load(sys.stdin); assert data['ok'] is True, data"
          curl -fsS -H "Authorization: Bearer ${OBSERVABILITY_SHARED_TOKEN}" http://127.0.0.1:8000/api/metrics/prometheus | tee /tmp/orbital-metrics.prom
          grep -q "orbital_observability_instrumented 1" /tmp/orbital-metrics.prom
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8888/metrics | tee /tmp/otelcol.prom | grep -q "otelcol_receiver_accepted_spans"; then
              break
            fi
            sleep 2
          done
          grep -q "otelcol_receiver_accepted_spans" /tmp/otelcol.prom
      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/orbital-observability-backend.log || true

  browser-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orbital_inspect_e2e
          POSTGRES_USER: orbital
          POSTGRES_PASSWORD: orbital_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbital -d orbital_inspect_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: frontend
    env:
      GEMINI_API_KEY: test-dummy-key
      ORBITAL_INSPECT_E2E_USE_POSTGRES: "1"
      ORBITAL_INSPECT_E2E_DATABASE_URL: postgresql+asyncpg://orbital:orbital_dev_password@127.0.0.1:5432/orbital_inspect_e2e
      ORBITAL_INSPECT_E2E_STORAGE_BACKEND: s3
      ORBITAL_INSPECT_E2E_STORAGE_BUCKET: orbital-inspect-e2e
      ORBITAL_INSPECT_E2E_STORAGE_REGION: us-east-1
      ORBITAL_INSPECT_E2E_STORAGE_ENDPOINT_URL: http://127.0.0.1:9000
      ORBITAL_INSPECT_E2E_STORAGE_ACCESS_KEY_ID: orbital
      ORBITAL_INSPECT_E2E_STORAGE_SECRET_ACCESS_KEY: orbital_storage_password
      ORBITAL_INSPECT_E2E_STORAGE_FORCE_PATH_STYLE: "true"
      ORBITAL_INSPECT_E2E_STORAGE_CREATE_BUCKET: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=orbital \
            -e MINIO_ROOT_PASSWORD=orbital_storage_password \
            minio/minio:RELEASE.2025-02-28T09-55-16Z \
            server /data --console-address :9001
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:9000/minio/health/live && break
            sleep 2
          done
      - run: pip install -r ../backend/requirements.txt
        working-directory: backend
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
