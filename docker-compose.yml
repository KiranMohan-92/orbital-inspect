services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orbital_inspect
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: orbital_dev_password
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbital"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [full]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [full]

  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    ports: ["8000:8000"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - DEMO_MODE=${DEMO_MODE:-true}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./orbital_inspect.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-console}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
    volumes: [./backend/data:/app/data]

  worker:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: ["python", "-m", "arq", "workers.analysis_worker.WorkerSettings"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./orbital_inspect.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    profiles: [full]

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    ports: ["3000:80"]
    depends_on: [api]

volumes:
  pgdata:
