services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orbital_inspect
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: orbital_dev_password
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbital"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [full]

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: orbital
      MINIO_ROOT_PASSWORD: orbital_storage_password
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    profiles: [full]

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on: [minio]
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set orbital http://minio:9000 orbital orbital_storage_password; do sleep 1; done
        mc mb -p orbital/orbital-inspect || true
    profiles: [full]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [full]

  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    ports: ["8000:8000"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - DEMO_MODE=${DEMO_MODE:-false}
      - DATABASE_AUTO_INIT=${DATABASE_AUTO_INIT:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://orbital:orbital_dev_password@postgres:5432/orbital_inspect}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-console}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-orbital-inspect}
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      - STORAGE_ENDPOINT_URL=${STORAGE_ENDPOINT_URL:-http://minio:9000}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID:-orbital}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY:-orbital_storage_password}
      - STORAGE_PREFIX=${STORAGE_PREFIX:-runtime}
      - STORAGE_FORCE_PATH_STYLE=${STORAGE_FORCE_PATH_STYLE:-true}
      - STORAGE_CREATE_BUCKET=${STORAGE_CREATE_BUCKET:-true}
    volumes: [./backend/data:/app/data]
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully

  worker:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: ["python", "-m", "arq", "workers.analysis_worker.WorkerSettings"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_AUTO_INIT=${DATABASE_AUTO_INIT:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://orbital:orbital_dev_password@postgres:5432/orbital_inspect}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-orbital-inspect}
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      - STORAGE_ENDPOINT_URL=${STORAGE_ENDPOINT_URL:-http://minio:9000}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID:-orbital}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY:-orbital_storage_password}
      - STORAGE_PREFIX=${STORAGE_PREFIX:-runtime}
      - STORAGE_FORCE_PATH_STYLE=${STORAGE_FORCE_PATH_STYLE:-true}
      - STORAGE_CREATE_BUCKET=${STORAGE_CREATE_BUCKET:-true}
    profiles: [full]
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    ports: ["3000:80"]
    depends_on: [api]

volumes:
  pgdata:
  minio-data:
