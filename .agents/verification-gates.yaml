# Verification Gates - When Cross-Model Review Is Required
# These gates define mandatory checkpoints in the development workflow.

gates:

  # Automatic Triggers
  large_change:
    trigger: ">200 lines changed in a single commit or PR"
    reviewer: auditor
    type: "diff-review"
    blocking: false
    description: "Auditor reviews for architectural impact and unintended side effects"

  new_agent:
    trigger: "New agent added to pipeline or AGENT_ORDER modified"
    reviewer: auditor
    type: "architecture-review"
    blocking: true
    description: "Pipeline changes require auditor sign-off before merge"

  security_change:
    trigger: "Changes to auth/, crypto, SSRF prevention, input validation, webhook secrets"
    reviewer: [auditor, verifier]
    type: "security-review"
    blocking: true
    description: "Security changes require two-model review"

  llm_output_handling:
    trigger: "Changes to gemini_service.py, parse_json_response, prompts, or agent error paths"
    reviewer: auditor
    type: "failure-mode-review"
    blocking: true
    description: "LLM output handling is a high-risk path; silent failures can propagate to risk decisions"

  schema_migration:
    trigger: "New alembic migration or changes to db/models.py"
    reviewer: auditor
    type: "schema-review"
    blocking: false
    description: "Schema changes reviewed for backward compatibility and data integrity"

  insurance_logic:
    trigger: "Changes to risk matrix calculation, underwriting recommendations, or provenance"
    reviewer: [auditor, verifier]
    type: "domain-review"
    blocking: true
    description: "Insurance logic changes require multi-model review"

  report_mode_authority:
    trigger: "Changes to assessment modes, report titles, decision authority, evidence gaps, or public/underwriting boundaries"
    reviewer: [auditor, verifier]
    type: "product-boundary-review"
    blocking: true
    description: "Public-risk-screen and underwriting-grade authority boundaries require explicit review"

  # Milestone Triggers
  pre_release:
    trigger: "Version bump or deployment to staging/production"
    reviewer: [builder, auditor, verifier]
    type: "three-model-sign-off"
    blocking: true
    description: "All three models independently verify readiness"

  full_re_audit:
    trigger: "All recommendations from prior audit implemented"
    reviewer: auditor
    type: "re-audit"
    blocking: false
    description: "Auditor re-scores all dimensions to measure improvement"

enforcement:
  mode: "ci-blocking"  # Options: advisory | ci-blocking
  log_to: "AGENTS.md"
  escalation: "If a blocking gate is skipped, CI fails until a review artifact is committed"
